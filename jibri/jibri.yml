services:
  jibri:
    image: jitsi/jibri:${JITSI_IMAGE_VERSION:-stable}
    container_name: jibri
    restart: ${RESTART_POLICY:-unless-stopped}
    shm_size: "2gb"
    cap_add:
      - SYS_ADMIN
    volumes:
      - ${CONFIG}/jibri:/config
    environment:
      - DISPLAY=:0
      - PUBLIC_URL
      - TZ
      - XMPP_SERVER
      - XMPP_PORT
      - XMPP_DOMAIN
      - XMPP_AUTH_DOMAIN
      - XMPP_INTERNAL_MUC_DOMAIN
      - XMPP_MUC_DOMAIN
      - XMPP_RECORDER_DOMAIN
      - XMPP_TRUST_ALL_CERTS
      - JIBRI_XMPP_USER
      - JIBRI_XMPP_PASSWORD
      - JIBRI_BREWERY_MUC
      - JIBRI_RECORDER_USER
      - JIBRI_RECORDER_PASSWORD
      - JIBRI_RECORDING_DIR
      - JIBRI_FINALIZE_RECORDING_SCRIPT_PATH
      - JIBRI_STRIP_DOMAIN_JID
      - JIBRI_PENDING_TIMEOUT
      - JIBRI_LOGS_DIR
